name: Build and Deploy

on:
  push:
    branches:
      - main
      - work
  workflow_dispatch:

env:
  REGISTRY: ghcr.io/${{ github.repository_owner }}
  IMAGE_NAME: api-realtime-ai
  CHART_PATH: charts/realtime-bridge

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME || github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push CPU image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Build and push GPU image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.gpu
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}-gpu
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-gpu

  deploy-dev:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
    env:
      KUBECONFIG: ${{ github.workspace }}/kubeconfig
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Write kubeconfig
        run: echo "${KUBE_CONFIG_DEV}" | base64 -d > ${KUBECONFIG}
        env:
          KUBE_CONFIG_DEV: ${{ secrets.KUBE_CONFIG_DEV }}

      - name: Deploy to dev
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          STT_API_KEY: ${{ secrets.STT_API_KEY }}
          TTS_API_KEY: ${{ secrets.TTS_API_KEY }}
          API_TOKENS: ${{ secrets.API_TOKENS }}
        run: |
          helm upgrade --install realtime-bridge ${CHART_PATH} \
            -f ${CHART_PATH}/values-dev.yaml \
            --set image.repository=${REGISTRY}/${IMAGE_NAME} \
            --set image.tag=${GITHUB_SHA} \
            --set secrets.openaiApiKey=${OPENAI_API_KEY} \
            --set secrets.sttApiKey=${STT_API_KEY} \
            --set secrets.ttsApiKey=${TTS_API_KEY} \
            --set secrets.apiTokens=${API_TOKENS}

      - name: Wait for dev rollout
        run: kubectl --kubeconfig ${KUBECONFIG} rollout status deployment/realtime-bridge --timeout=120s

  verify-dev:
    runs-on: ubuntu-latest
    needs: deploy-dev
    permissions:
      contents: read
    env:
      KUBECONFIG: ${{ github.workspace }}/kubeconfig
    steps:
      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Write kubeconfig
        run: echo "${KUBE_CONFIG_DEV}" | base64 -d > ${KUBECONFIG}
        env:
          KUBE_CONFIG_DEV: ${{ secrets.KUBE_CONFIG_DEV }}

      - name: Smoke test service endpoint
        run: |
          CLUSTER_IP=$(kubectl --kubeconfig ${KUBECONFIG} get svc realtime-bridge -o jsonpath='{.spec.clusterIP}')
          kubectl --kubeconfig ${KUBECONFIG} run curl-check --rm -i --image=curlimages/curl:8.7.1 --restart=Never -- \
            curl -sf http://${CLUSTER_IP}:8080/health

  deploy-prod:
    runs-on: ubuntu-latest
    needs: verify-dev
    environment: production
    permissions:
      contents: read
    env:
      KUBECONFIG: ${{ github.workspace }}/kubeconfig
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Write kubeconfig
        run: echo "${KUBE_CONFIG_PROD}" | base64 -d > ${KUBECONFIG}
        env:
          KUBE_CONFIG_PROD: ${{ secrets.KUBE_CONFIG_PROD }}

      - name: Deploy to prod
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          STT_API_KEY: ${{ secrets.STT_API_KEY }}
          TTS_API_KEY: ${{ secrets.TTS_API_KEY }}
          API_TOKENS: ${{ secrets.API_TOKENS }}
        run: |
          helm upgrade --install realtime-bridge ${CHART_PATH} \
            -f ${CHART_PATH}/values-prod.yaml \
            --set image.repository=${REGISTRY}/${IMAGE_NAME} \
            --set image.tag=${GITHUB_SHA} \
            --set imageGpu.repository=${REGISTRY}/${IMAGE_NAME} \
            --set imageGpu.tag=${GITHUB_SHA}-gpu \
            --set secrets.openaiApiKey=${OPENAI_API_KEY} \
            --set secrets.sttApiKey=${STT_API_KEY} \
            --set secrets.ttsApiKey=${TTS_API_KEY} \
            --set secrets.apiTokens=${API_TOKENS}

      - name: Wait for prod rollout
        run: kubectl --kubeconfig ${KUBECONFIG} rollout status deployment/realtime-bridge --timeout=180s
