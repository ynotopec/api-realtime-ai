apiVersion: v1
kind: Secret
metadata:
  name: {{ include "realtime-bridge.fullname" . }}-secrets
  labels:
    {{- include "realtime-bridge.labels" . | nindent 4 }}
  {{- if .Values.secretAnnotations }}
  annotations:
    {{- toYaml .Values.secretAnnotations | nindent 4 }}
  {{- end }}
type: Opaque
stringData:
  OPENAI_API_KEY: {{ .Values.secrets.openaiApiKey | quote }}
  STT_API_KEY: {{ .Values.secrets.sttApiKey | quote }}
  TTS_API_KEY: {{ .Values.secrets.ttsApiKey | quote }}
  API_TOKENS: {{ .Values.secrets.apiTokens | quote }}
