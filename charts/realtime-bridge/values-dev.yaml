image:
  repository: ghcr.io/your-org/api-realtime-ai
  tag: "dev"
  pullPolicy: Always

gpu:
  enabled: false

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 60

ingress:
  enabled: true
  className: nginx
  hosts:
    - host: dev-realtime.example.com
      paths:
        - path: /
          pathType: Prefix

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 750m
    memory: 512Mi

secrets:
  openaiApiKey: "${OPENAI_API_KEY}"  # supplied via CI/CD substitution
  sttApiKey: "${STT_API_KEY}"
  ttsApiKey: "${TTS_API_KEY}"
  apiTokens: "${API_TOKENS}"

env:
  config:
    openaiApiModel: "gpt-4o-realtime"
    ttsApiUrl: "https://tts.dev.example.com"

nodeSelector:
  environment: dev
