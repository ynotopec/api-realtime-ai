image:
  repository: ghcr.io/your-org/api-realtime-ai
  tag: "dev"
  pullPolicy: Always

gpu:
  enabled: false

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 60

ingress:
  enabled: true
  className: nginx
  hosts:
    - host: dev-realtime.example.com
      paths:
        - path: /
          pathType: Prefix

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 750m
    memory: 512Mi

secrets:
  openaiApiKey: "${OPENAI_API_KEY}"  # supplied via CI/CD substitution
  sttApiKey: "${STT_API_KEY}"
  ttsApiKey: "${TTS_API_KEY}"
  apiTokens: "${API_TOKENS}"

env:
  config:
    openaiApiModel: "gpt-4o-realtime"
    ttsApiUrl: "https://tts.dev.example.com"

monitoring:
  alerts:
    enabled: true
    latency:
      window: 5m
      p99Seconds: 2.5
      for: 5m
    errorRate:
      window: 5m
      threshold: 0.1
      for: 5m
    tokenThroughput:
      window: 10m
      minTokensPerSec: 1
      for: 10m
    feedbackPositiveRate:
      window: 15m
      minRate: 0.6
      for: 10m

nodeSelector:
  environment: dev
