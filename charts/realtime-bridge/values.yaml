replicaCount: 1

image:
  repository: ghcr.io/your-org/api-realtime-ai
  tag: "latest"
  pullPolicy: IfNotPresent

imageGpu:
  repository: ghcr.io/your-org/api-realtime-ai
  tag: "latest-gpu"

gpu:
  enabled: false
  nodeSelector: {}
  tolerations: []
  runtimeClassName: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: true
  className: ""
  annotations: {}
  hosts:
    - host: realtime.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 70

env:
  server:
    host: "0.0.0.0"
    port: "8080"
  config:
    openaiApiBase: ""
    openaiApiModel: ""
    sttApiBase: ""
    ttsApiUrl: ""
    defaultVadStartMs: ""
    defaultVadEndMs: ""
    defaultVadPadMs: ""
    defaultVadMaxMs: ""
    defaultVadMinVoiceMs: ""
    defaultVadAutoresp: ""

configMapAnnotations: {}
secretAnnotations: {}

secrets:
  openaiApiKey: ""
  sttApiKey: ""
  ttsApiKey: ""
  apiTokens: ""

nodeSelector: {}
tolerations: []
affinity: {}
